services:
  mysql:
    image: mysql:8.4
    container_name: helios-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_dev # pragma: allowlist secret
      MYSQL_DATABASE: helios
      MYSQL_USER: helios
      MYSQL_PASSWORD: helios_dev # pragma: allowlist secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uhelios", "-phelios_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: helios-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mysql_data:
  redis_data:
